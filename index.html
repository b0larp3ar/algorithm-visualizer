<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Algorithm Visualizer</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <div>
        <h1>Algorithm Visualizer</h1>
    </div>

    <!--main container-->
    <div class="main-container">
        <!--Control section-->
        <div class="controls">
            <button id="generate">Generate New Array</button><br><br><br>
            <select id="algorithm">
                <option value="none">none</option>
                <option value="bubble">Bubble sort</option>
                <option value="selection">Selection sort</option>
                <option value="insertion">Insertion sort</option>
                <option value="merge">Merge Sort</option>
                <option value="quick">Quick Sort</option>
            </select><br><br><br>
            <button id="start">Start Sorting</button><br><br><br>
            <label>
                Speed:
                <input type="range" id="speed" min="10" max="500" value="100">
            </label>
            <label for="size">Array Size</label>
            <input type="range" id="size" min="10" max="120" value="40">
        </div>

        <!--Bars-->
        <div id="array-container"></div>

        <!--Time complexity + explanation-->
        <div class="controls">
            <!--Time complexity-->
            <div class="time-complexity">
                <h3>Time Complexity</h3>
                <p>Best: <span id="best-case">-</span></p>
                <p>Average: <span id="avg-case">-</span></p>
                <p>Worst: <span id="worst-case">-</span></p>
            </div>

            <!--Explanation panel-->
            <div class="explanation">
                <h3>Algorithm Explanation</h3>
                <p id="algo-explanation">
                    Select an algorithm to see how it works.
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
